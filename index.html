<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emes Agencia Creativa</title>
    <!-- Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <!-- Excon variable -->
    <link href="https://api.fontshare.com/v2/css?f[]=excon@1,2&display=swap" rel="stylesheet">
    <!-- Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Domine:wght@400..700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans+Mono:wght@100..900&family=Petit+Formal+Script&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Playwrite+AT:ital,wght@0,100..400;1,100..400&family=Ysabeau+SC:wght@1..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

    <header class="header">
        <nav class="nav-container" id="main-nav">
            <h1 class="header__logo">
            <!-- los aria-label sirven para que los lectores de código tengan más info sobre el html semántico -->
                <a href="#" aria-label="Emes Agencia Creativa - inicio">
                    <img src="assets/logo-emes-morado.svg" alt="logo" class="logo-img">
                    <span class="visually-hidden">Emes Agencia Creativa</span>
                </a>
            </h1>

            <input type="checkbox" id="menu-toggle" class="menu-checkbox">

        <!-- Estos span vacios son las 3 rayas del menú hamburguesa -->
            <label for="menu-toggle" class="nav__burguer" aria-label="Abrir menú">
                <span></span>
                <span></span>
                <span></span>
            </label>
        
        <!-- NAV DESKTOP (pantallas grandes = >768px) -->
            <div class="header__menu">
                <ul class="header__menu_list">
                    <li><a href="la-agencia/index.html">La agencia</a></li>
                    <li><a href="proyectos/index.html">Proyectos</a></li>
                    <li><a href="servicios/index.html">Servicios</a></li>
                    <li><a href="contacto/index.html">¿Hablamos?</a></li>
                </ul>
            </div>

        <!-- OVERLAY MENÚ HAMBURGUESA-->
        <!-- role="dialog" le indica al navegador que esto es una capa que aparece encima del contenido -->
        <!-- aria-modal="true" le indica al navegador que cuando el menú esté abierto solo lea eso y no el resto de la página  -->
    <div class="menu__overlay">
   <div class="menu__overlay_header"> 
<div class="menu__overlay_header">
    <img src="assets/logo-emes-contorno.svg" alt="logo Emes" class="menu__overlay_logo menu__overlay_logo--solid">
</div>
   </div>
                <nav class="menu__overlay_nav">
                    <ul class="menu__overlay_nav_list">
                        <li><a href="la-agencia/index.html">La agencia</a></li>
                        <li><a href="proyectos/index.html">Proyectos</a></li>
                        <li><a href="servicios/index.html">Servicios</a></li>
                        <li><a href="contacto/index.html">¿Hablamos?</a></li>
                    </ul>
                </nav>

                <!-- el aria laber es para darle más info al lector de pantalla -->

                <div class="menu__footer">
                    <img src="assets/logo-mm-contorno.svg" alt="Logo contorno" class="menu__footer_logo">
                    
                    <div class="social-icons">
                        <a href="#" aria-label="Instagram"><img src="assets/instagram.svg" width="22" height="22 " alt="Icono de Instagram"></a>
                
                        <a href="#" aria-label="TikTok"><img src="assets/tiktok.svg" width="20" height="23" alt="Icono de TikTok"></a>
                
                        <a href="#" aria-label="LinkedIn"><img src="assets/linkedin.svg" width="22" height="22 " alt="Icono de LinkedIn"></a>
                    </div>
                
                    <p class="copyright">© Emes Agencia Creativa</p>
                </div>
            </div>
        </nav>
    </header>


<footer class="footer">
<!-- hacemos dos columnas para facilitar el diseño -->
 <div class="footer__left">
    <div class="footer__brand-group">
    <!-- aria-hidden="true" porque es decorativo — el copyright ya identifica la marca, no hace falta que el lector de pantalla lo lea dos veces  -->
    <img src="assets/logo-mm-contorno.svg" alt="" class="footer__logo" aria-hidden="true">
    <p class="footer__copy">© Emes Agencia Creativa</p>
    </div>
 </div>

 <div class="footer__right">
<div class="footer__contact-group">
    <!-- fila de iconos sociales -->
     <div class="footer__social">
        <a href="#" aria-label="Instagram"><img src="assets/instagram.svg" width="22" height="22 " alt="Icono de Instagram"></a>
        
        <a href="#" aria-label="TikTok"><img src="assets/tiktok.svg" width="20" height="23" alt="Icono de TikTok"></a>
        
        <a href="#" aria-label="LinkedIn"><img src="assets/linkedin.svg" width="22" height="22 " alt="Icono de LinkedIn"></a>
     </div>

    <a href="mailto:hola@emesagenciacreativa.com" class="footer__email">hola@emesagenciacreativa.com</a>
    </div>

    <!-- nav semántico para los links legales, usamos nav porque es un grupo de enlaces de navegación pero se diferencia del nav principal del header con aria label-->
    <nav class="footer__legal" aria-label="Enlaces legales">
        <a href="#">Política de cookies</a>
        <a href="#">Política de privacidad</a>
        <a href="#">Aviso legal</a>
    </nav>
 </div>
</footer>
    
<script>
// TRANSPARENCIA PARA EL HEADER AL HACER SCROLL (SOLO EN MÓVIL)
const nav = document.getElementById('main-nav');

    window.addEventListener('scroll', () => {
        if (window.scrollY > 10) {
            nav.classList.add('nav--scrolled');
        } else {
            nav.classList.remove('nav--scrolled');
        }
    });
</script>
</body>

</html>
