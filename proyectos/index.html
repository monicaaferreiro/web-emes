<body>

<script>
    /**
     * LÓGICA DE PROYECTOS EN BUCLE INFINITO SINCRONIZADA CON SCROLL REAL
     */

        document.addEventListener('DOMContentLoaded', () => {

            // 1. Seleccionamos los elementos de las columnas
            const leftList = document.getElementById('left-list');
            const rightList = document.getElementById('right-list');

            // Seleccionamos las tarjetas originales para medir dimensiones
            const originalCards = leftList.querySelectorAll('.project-card');

            // Si no hay tarjetas, detenemos la ejecución
            if (originalCards.length === 0) return;

            // 2. Función para clonar las tarjetas (necesario para el efecto visual de bucle)
            //con cloneCards creamos el bucle infinito, sube la última foto al desaparecer la primera, creando una especie de rueda
            const cloneCards = (list) => {
                const cardsToClone = list.querySelectorAll('.project-card');
                cardsToClone.forEach(card => {
                    const clone = card.cloneNode(true);
                    list.appendChild(clone);
                });
            };

            // Ejecutamos la clonación en ambas columnas
            cloneCards(leftList);
            cloneCards(rightList);

            // 3. Cálculos de altura para el bucle
            // Medimos la altura de una tarjeta + sus márgenes
            const cardMargin = 10; // Debe coincidir con --card-margin en tu CSS
            const cardHeight = originalCards[0].offsetHeight + (cardMargin * 2);
            const totalSingleHeight = originalCards.length * cardHeight;

            /**
             * Función de animación principal
             * Se ejecuta en cada frame para mover las listas según el scroll del usuario
             */
            function updateProjectsOnScroll() {
                // Obtenemos la posición actual de scroll del navegador
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

                // Usamos el operador módulo (%) para que el valor "vuelva a cero" 
                // cuando hayamos recorrido la altura de la lista original.
                const scrollAmount = scrollTop % totalSingleHeight;

                // COLUMNA IZQUIERDA: Sube (valor negativo)
                leftList.style.transform = `translateY(-${scrollAmount}px)`;

                // COLUMNA DERECHA: Baja (valor positivo)
                // La ajustamos restando totalSingleHeight para que la segunda copia 
                // de fotos esté siempre visible mientras bajamos.
                rightList.style.transform = `translateY(${scrollAmount - totalSingleHeight}px)`;

                // Mantenemos la animación fluida
                requestAnimationFrame(updateProjectsOnScroll);
            }

            /**
             * Control de "Scroll Infinito" del navegador
             * Si el usuario llegara al final de los 1000vh del body, lo devolvemos al inicio
             * sutilmente para que nunca se detenga la posibilidad de hacer scroll.
             */
            window.addEventListener('scroll', () => {
                const currentScroll = window.pageYOffset || document.documentElement.scrollTop;
                const bodyHeight = document.body.offsetHeight;
                const windowHeight = window.innerHeight;

                if (currentScroll + windowHeight >= bodyHeight - 10) {
                    // Saltamos al inicio (casi imperceptible por el bucle visual)
                    window.scrollTo(0, 10);
                } else if (currentScroll <= 0) {
                    // Si intenta subir más allá del inicio, lo mandamos un poco abajo
                    window.scrollTo(0, bodyHeight - windowHeight - 10);
                }
            });

            // Iniciamos el ciclo de animación
            updateProjectsOnScroll();
        });
</script>

</body>
